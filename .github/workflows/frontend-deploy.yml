name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/frontend-deploy.yml'
      - 'frontend/**'
      - 'scripts/frontend/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: frontend-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
        env:
          CYBER_EYES_ACTIVE_TARGET_ID: ${{ vars.CYBER_EYES_ACTIVE_TARGET_ID }}
          CYBER_EYES_REMOTE_HTTP_BASE_URL: ${{ vars.CYBER_EYES_REMOTE_HTTP_BASE_URL }}
          CYBER_EYES_REMOTE_TARGET_DESCRIPTION: ${{ vars.CYBER_EYES_REMOTE_TARGET_DESCRIPTION }}
          CYBER_EYES_REMOTE_TARGET_ID: ${{ vars.CYBER_EYES_REMOTE_TARGET_ID }}
          CYBER_EYES_REMOTE_TARGET_LABEL: ${{ vars.CYBER_EYES_REMOTE_TARGET_LABEL }}
          CYBER_EYES_REMOTE_TARGET_MODE: ${{ vars.CYBER_EYES_REMOTE_TARGET_MODE }}
          CYBER_EYES_REMOTE_WS_BASE_URL: ${{ vars.CYBER_EYES_REMOTE_WS_BASE_URL }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
